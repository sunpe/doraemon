[server]
listen = "127.0.0.1:8765"
read_timeout = "5s"
write_timeout = "30s"

[storage]
type = "bbolt"
path = "./data/doraemon.db"

[audit]
enabled = true
retention_days = 30
store_stdout = false
store_stderr = false

[limits]
default_timeout = "10s"
max_stdout_bytes = 1048576
max_stderr_bytes = 262144
